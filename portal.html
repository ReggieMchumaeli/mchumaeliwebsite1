<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Portal - Reggie & Partners</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .navbar { background-color: #1e2a44 !important; padding: 18px 0; }
        .navbar-brand { font-size: 1.5rem; font-weight: bold; }
        .nav-link { color: #fff !important; margin: 0 8px; }
        .nav-link:hover { color: #ffd700 !important; }
        .bracket { color: #ffd700; }
        #messages { 
            height: 420px; 
            overflow-y: scroll; 
            background: #f8f9fa; 
            border: 1px solid #ddd; 
            padding: 15px;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark fixed-top" style="background-color: #1e2a44;">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">⚖️ Reggie & Partners</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><span class="bracket mx-2">→</span></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
                    <li class="nav-item"><span class="bracket mx-2">→</span></li>
                    <li class="nav-item"><a class="nav-link" href="services.html">Services</a></li>
                    <li class="nav-item"><span class="bracket mx-2">→</span></li>
                    <li class="nav-item"><a class="nav-link" href="team.html">Our Team</a></li>
                    <li class="nav-item"><span class="bracket mx-2">→</span></li>
                    <li class="nav-item"><a class="nav-link active" href="portal.html">Client Portal</a></li>
                    <li class="nav-item"><span class="bracket mx-2">→</span></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
                <a href="contact.html" class="btn btn-warning ms-4">📞 Book Consultation</a>
            </div>
        </div>
    </nav>

    <div class="container py-5 mt-5">
        <h1 class="text-center mb-5">Client Portal</h1>

        <!-- Case Submission Form -->
        <div class="card mb-5">
            <div class="card-header bg-primary text-white">
                <h5>Submit New Case / Inquiry</h5>
            </div>
            <div class="card-body">
                <form id="caseForm">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label>Full Name</label>
                            <input type="text" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label>Case Type</label>
                            <select class="form-control" required>
                                <option>Criminal Law</option>
                                <option>Family Law</option>
                                <option>Corporate Law</option>
                                <option>Civil Litigation</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label>Case Description</label>
                        <textarea class="form-control" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-success">Submit Case</button>
                </form>
            </div>
        </div>

        <!-- Messaging System -->
        <div class="card">
            <div class="card-header bg-success text-white">
                <h5>Messages with Your Advocate</h5>
            </div>
            <div class="card-body" id="messages"></div>
            <div class="card-footer">
                <div class="input-group">
                    <input type="text" id="messageInput" class="form-control" placeholder="Type your message...">
                    <button class="btn btn-primary" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white py-5 text-center">
        <div class="container">
            <p>&copy; 2026 Reggie & Partners Law Firm. All Rights Reserved. | Gaborone, Botswana</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let messages = [
            {from: "Advocate", text: "Good day. I have reviewed your case file."},
            {from: "You", text: "Thank you. Any updates?"}
        ];

        function renderMessages() {
            const div = document.getElementById('messages');
            div.innerHTML = messages.map(m => `
                <div class="mb-3">
                    <strong>${m.from}:</strong> ${m.text}
                </div>
            `).join('');
            div.scrollTop = div.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            if (input.value.trim()) {
                messages.push({from: "You", text: input.value});
                renderMessages();
                input.value = '';
                
                setTimeout(() => {
                    messages.push({from: "Advocate", text: "I will revert shortly with next steps."});
                    renderMessages();
                }, 1000);
            }
        }

        document.getElementById('caseForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert("Case submitted successfully! Our team will contact you.");
            this.reset();
        });

        renderMessages();
    </script>
</body>
</html>
